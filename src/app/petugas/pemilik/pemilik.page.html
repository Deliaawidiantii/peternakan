<app-page-header
  title="Daftar Pemilik"
  subtitle="Data pemilik ternak yang terhubung dengan kandang dan populasi hewan."
  defaultHref="/petugas/tabs/home"
></app-page-header>

<ion-content fullscreen class="page-content">
  <ion-refresher slot="fixed" (ionRefresh)="doRefresh($event)">
    <ion-refresher-content pullingIcon="chevron-down-circle-outline" pullingText="Tarik untuk refresh"
      refreshingSpinner="crescent" refreshingText="Memuat data...">
    </ion-refresher-content>
  </ion-refresher>

  <div class="content-wrapper fab-bottom">
    <div class="modern-searchbar">
      <ion-searchbar placeholder="Cari Pemilik (Nama, NIK, Desa)" [(ngModel)]="query" (ionInput)="filterPemilik()"
        showCancelButton="never">
      </ion-searchbar>
    </div>

    <div class="list-header-row">
      <h3 class="section-label pemilik-section-title">
        <ion-icon name="people-outline"></ion-icon>
        Daftar Pemilik
      </h3>
      <span class="count-badge">{{ filteredPemilik.length }}</span>
    </div>

    <app-loading-state
      *ngIf="isLoading && pemilikList.length === 0"
      [card]="true"
      title="Memuat data pemilik"
      caption="Menata daftar peternak agar siap dibaca."
    ></app-loading-state>

    <app-empty-state
      *ngIf="!isLoading && filteredPemilik.length === 0"
      icon="people-outline"
      title="Belum ada data pemilik"
      [caption]="query === '' ? 'Klik tombol + untuk menambahkan pemilik baru.' : 'Tidak ada hasil yang cocok dengan pencarian Anda.'"
    ></app-empty-state>

    <div class="cards-list pemilik-stack" *ngIf="!isLoading && filteredPemilik.length > 0">
      <div class="data-card border-blue" *ngFor="let p of filteredPemilik" (click)="openPemilik(p)" tappable>
        <div class="pemilik-row">
          <div class="avatar-circle" [style.background]="p.color">
            <span>{{ p.initials }}</span>
          </div>

          <div class="pemilik-info">
            <div class="card-top-row">
              <div class="title-wrap">
                <p class="card-title">{{ p.name }}</p>
                <p class="card-subtitle">NIK {{ p.nik }}</p>
              </div>
              <ion-icon name="chevron-forward-outline" class="arrow-icon"></ion-icon>
            </div>

            <div class="card-meta">
              <span class="meta-item">
                <ion-icon name="location-outline"></ion-icon>
                {{ p.village }}
              </span>
              <span class="meta-item">
                <ion-icon name="call-outline"></ion-icon>
                {{ p.phone || '-' }}
              </span>
            </div>

            <div class="card-meta secondary-meta">
              <span class="meta-item">
                <ion-icon name="person-outline"></ion-icon>
                {{ p.gender || '-' }}
              </span>
              <span class="meta-item">
                <ion-icon name="calendar-outline"></ion-icon>
                {{ p.birthdate ? (p.birthdate | date:'dd MMM yyyy') : '-' }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="goToAddPemilik()" color="primary">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
