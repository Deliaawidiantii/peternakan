<ion-header class="custom-header">
  <ion-toolbar color="light">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/"></ion-back-button>
    </ion-buttons>
    <ion-title>Kasus Penyakit</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding custom-bg">
  <div *ngIf="kasusList.length === 0" class="empty-state">
    Belum ada kasus penyakit.
  </div>

  <ion-item
    *ngFor="let kasus of kasusList"
    lines="none"
    class="case-item"
    (click)="goToDetail(kasus)">
    <img [src]="getFotoUrl(kasus.foto)" alt="Kasus penyakit" class="disease-image">
    <ion-label>
      <h2>{{ kasus.diagnosa || kasus.jenis_penyakit || 'Menunggu Diagnosa' }}</h2>
      <p>Gejala: {{ kasus.gejala || kasus.deskripsi || '-' }}</p>
      <p>
        Status:
        <span class="status" [ngClass]="getStatusClass(kasus.status_validasi)">
          {{ getStatusLabel(kasus.status_validasi) }}
        </span>
      </p>
    </ion-label>
  </ion-item>
</ion-content>
