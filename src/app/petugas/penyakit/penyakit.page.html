<app-page-header
  title="Penyakit"
  subtitle="Pantau kasus penyakit, update perkembangan, dan riwayat penanganan."
  defaultHref="/petugas/tabs/home"
></app-page-header>

<ion-content class="page-content">
  <div class="content-wrapper compact-bottom">
    <div class="section-block">
      <h3 class="section-label">
        <ion-icon name="medkit-outline"></ion-icon>
        Manajemen Penyakit
      </h3>

      <div class="penyakit-menu">
        <div class="menu-card" routerLink="/petugas/laporan-kasus-penyakit">
          <div class="menu-card-icon red">
            <ion-icon name="add-circle-outline"></ion-icon>
          </div>
          <div class="menu-card-text">
            <h3>Laporan Kasus Penyakit</h3>
            <p>Buat laporan kasus baru berdasarkan temuan di lapangan.</p>
          </div>
          <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
        </div>

        <div class="menu-card" routerLink="/petugas/daftar-penyakit">
          <div class="menu-card-icon orange">
            <ion-icon name="create-outline"></ion-icon>
          </div>
          <div class="menu-card-text">
            <h3>Perbarui Kasus Penyakit</h3>
            <p>Kelola status validasi dan perkembangan kasus yang berjalan.</p>
          </div>
          <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
        </div>

        <div class="menu-card" routerLink="/petugas/riwayat-perkembangan-penyakit">
          <div class="menu-card-icon blue">
            <ion-icon name="time-outline"></ion-icon>
          </div>
          <div class="menu-card-text">
            <h3>Riwayat Penyakit</h3>
            <p>Lihat riwayat perkembangan dan hasil penanganan kasus.</p>
          </div>
          <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
        </div>
      </div>
    </div>
  </div>
</ion-content>
