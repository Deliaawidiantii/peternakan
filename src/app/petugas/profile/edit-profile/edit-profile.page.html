<ion-header class="ion-no-border">
  <ion-toolbar>
    <div class="gradient-header compact-header">
      <div class="header-row">
        <div style="display:flex;align-items:center;gap:12px;min-width:0;">
          <ion-back-button defaultHref="/petugas/tabs/profile" text=""></ion-back-button>
          <div class="header-copy">
            <h2 class="gradient-title">Edit Profil</h2>
            <p class="gradient-subtitle">Perbarui identitas petugas, wilayah binaan, dan foto profil Anda.</p>
          </div>
        </div>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="content-wrapper editor-shell">
    <div class="page-card editor-profile-card" (click)="selectPhoto()">
      <div class="profile-photo" [ngStyle]="previewUrl ? { 'background-image': 'url(' + previewUrl + ')' } : null">
        <ion-icon *ngIf="!previewUrl" name="camera-outline"></ion-icon>
      </div>
      <div class="profile-text">
        <h2>Ganti Foto</h2>
        <p>Ketuk untuk memilih foto profil baru</p>
        <span class="email-chip">
          <ion-icon name="mail-outline"></ion-icon>
          {{ userEmail }}
        </span>
      </div>
    </div>

    <input type="file" #fileInput accept="image/*" hidden (change)="onFileSelected($event)" />

    <div class="page-card status-note">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
      <div>
        <h3>Status Akun</h3>
        <p>{{ statusLabel }}</p>
      </div>
    </div>

    <div class="form-container">
      <div class="form-section">
        <h3 class="section-title">Informasi Dasar</h3>

        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <ion-input [(ngModel)]="form.nama" class="form-input" type="text" placeholder="Masukkan nama lengkap"></ion-input>
        </div>

        <div class="form-group">
          <label class="form-label">NIK</label>
          <ion-input [(ngModel)]="form.nik" class="form-input" type="text" placeholder="Masukkan NIK"></ion-input>
        </div>

        <div class="form-group">
          <label class="form-label">Alamat</label>
          <ion-textarea [(ngModel)]="form.alamat" class="form-textarea" rows="4" placeholder="Masukkan alamat"></ion-textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Nomor HP</label>
          <ion-input [(ngModel)]="form.no_telp" class="form-input" type="tel" placeholder="Masukkan nomor HP"></ion-input>
        </div>
      </div>

      <div class="form-section">
        <h3 class="section-title">Wilayah Binaan</h3>

        <div class="form-group">
          <label class="form-label">Desa Binaan</label>
          <ion-select [(ngModel)]="form.desa_binaan" class="form-select" interface="action-sheet" placeholder="Pilih desa binaan">
            <ion-select-option *ngFor="let wilayah of wilayahList" [value]="wilayah.id">
              {{ wilayah.nama_desa }}
            </ion-select-option>
          </ion-select>
        </div>
      </div>
    </div>

    <div class="button-stack">
      <ion-button expand="block" class="submit-btn" [disabled]="isLoading" (click)="saveProfile()">
        Simpan Perubahan
      </ion-button>
      <ion-button expand="block" fill="outline" color="medium" class="cancel-btn" (click)="cancel()">
        Batal
      </ion-button>
    </div>
  </div>
</ion-content>
