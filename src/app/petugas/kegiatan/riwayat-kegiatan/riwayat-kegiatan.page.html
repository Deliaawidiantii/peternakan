<app-page-header
  title="Riwayat Kegiatan"
  subtitle="Lacak kegiatan yang selesai atau dibatalkan."
  defaultHref="/petugas/kegiatan"
></app-page-header>

<ion-content class="page-content">
  <div class="content-wrapper compact-bottom">
    <div class="modern-searchbar">
      <ion-searchbar placeholder="Cari kegiatan..." [value]="searchQuery" (ionInput)="onSearchChange($event)"></ion-searchbar>
    </div>

    <div class="filters-bar single-filter">
      <div class="filter-card">
        <ion-select interface="popover" [(ngModel)]="selectedStatus" (ionChange)="onFilterChange()" placeholder="Pilih status">
          <ion-select-option value="Semua">Semua</ion-select-option>
          <ion-select-option value="Selesai">Selesai</ion-select-option>
          <ion-select-option value="Dibatalkan">Dibatalkan</ion-select-option>
        </ion-select>
      </div>
    </div>

    <app-loading-state
      *ngIf="isLoading"
      [card]="true"
      title="Memuat riwayat kegiatan"
      caption="Menyiapkan histori kegiatan dari server."
    ></app-loading-state>

    <app-empty-state
      *ngIf="!isLoading && riwayatList.length === 0"
      icon="document-text-outline"
      title="Tidak ada riwayat"
      caption="Coba ubah kata kunci pencarian atau status filter."
    ></app-empty-state>

    <div class="page-card" *ngIf="!isLoading && riwayatList.length > 0">
      <div class="info-item-global riwayat-item" *ngFor="let item of riwayatList">
        <div class="icon-circle" [ngClass]="(item.status_aktual || item.status) === 'dibatalkan' ? 'red' : 'green'">
          <ion-icon [name]="getIconName(item.jenis)"></ion-icon>
        </div>

        <div class="riwayat-copy">
          <p class="card-title">{{ item.jenis }}</p>
          <p class="card-subtitle">{{ item.tanggal | date:'dd MMMM yyyy' }}</p>
          <p class="riwayat-desc" *ngIf="item.deskripsi">{{ item.deskripsi }}</p>
        </div>

        <span class="status-badge" [ngClass]="(item.status_aktual || item.status) === 'dibatalkan' ? 'rejected' : 'approved'">
          {{ (item.status_aktual || item.status) === 'dibatalkan' ? 'Dibatalkan' : 'Selesai' }}
        </span>
      </div>
    </div>
  </div>
</ion-content>
