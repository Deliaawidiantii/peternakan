<ion-header>
  <ion-toolbar color="light">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="petugas/tabs/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Kegiatan</ion-title>
    <ion-buttons slot="end">
      <ion-button>
        <ion-icon name="add-circle-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Akses cepat -->
  <ion-list-header>
    <ion-label class="section-title">Akses Cepat</ion-label>
  </ion-list-header>

  <ion-item routerLink="/petugas/jadwal-kegiatan">
    <ion-avatar slot="start" class="icon-bg">
      <ion-icon name="calendar-outline"></ion-icon>
    </ion-avatar>
    <ion-label>Jadwal Kegiatan</ion-label>
  </ion-item>

  <ion-item routerLink="/petugas/riwayat-kegiatan">
    <ion-avatar slot="start" class="icon-bg">
      <ion-icon name="time-outline"></ion-icon>
    </ion-avatar>
    <ion-label>Riwayat Kegiatan</ion-label>
  </ion-item>

  <ion-item routerLink="/petugas/request-kegiatan">
    <ion-avatar slot="start" class="icon-bg">
      <ion-icon name="clipboard-outline"></ion-icon>
    </ion-avatar>
    <ion-label>Request Kegiatan</ion-label>
  </ion-item>

  <!-- Kegiatan sedang berjalan  -->
  <ion-list lines="none">
    <ion-list-header>
      <ion-label class="section-title">Kegiatan Berjalan</ion-label>
    </ion-list-header>

    <div class="ion-text-center ion-padding" *ngIf="isLoading">
      <ion-spinner name="crescent"></ion-spinner>
    </div>

    <div class="ion-text-center" *ngIf="!isLoading && kegiatanBerjalan.length === 0">
      <p style="color: #888;">Belum ada kegiatan yang sedang berjalan.</p>
    </div>

    <ion-item class="activity-item" *ngFor="let item of kegiatanBerjalan">
      <ion-avatar slot="start" class="icon-bg">
        <ion-icon [name]="getIconName(item.jenis)"></ion-icon>
      </ion-avatar>

      <ion-label>
        <h2>{{ item.jenis }}</h2>
        <p>{{ item.tanggal | date:'dd MMMM yyyy' }}</p>
        <p>{{ item.jam_mulai }} - {{ item.jam_selesai }}</p>
        </label>
        <ion-button slot="end" size="small" color="primary" [routerLink]="['/petugas/detail-kegiatan', item.id]">
          Lihat
        </ion-button>
    </ion-item>
  </ion-list>
</ion-content>
