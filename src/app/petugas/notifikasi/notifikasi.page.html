<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/petugas/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Notifikasi <ion-badge color="danger" *ngIf="unreadCount > 0">{{ unreadCount }}</ion-badge></ion-title>
    <ion-buttons slot="end" *ngIf="unreadCount > 0">
      <ion-button (click)="markAllAsRead()">
        <ion-icon slot="icon-only" name="checkmark-done-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="notif-content">

  <!-- Loading State -->
  <div class="ion-text-center ion-padding" *ngIf="isLoading">
    <ion-spinner name="crescent"></ion-spinner>
    <p>Memuat notifikasi...</p>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!isLoading && notifikasiList.length === 0">
    <ion-icon name="notifications-off-outline" style="font-size: 64px; color: #ccc;"></ion-icon>
    <p>Tidak ada notifikasi saat ini</p>
  </div>

  <!-- Notifikasi List -->
  <ion-list lines="none" *ngIf="!isLoading && notifikasiList.length > 0">
    <ion-item class="notif-item" *ngFor="let item of notifikasiList" [ngClass]="{'unread': !item.read_at}"
      (click)="markAsRead(item)">

      <ion-avatar slot="start" class="notif-icon" [ngClass]="getIconProps(item.type).bg">
        <ion-icon [name]="getIconProps(item.type).name" [color]="getIconProps(item.type).color"></ion-icon>
      </ion-avatar>

      <ion-label>
        <h2>{{ item.data?.title || 'Notifikasi' }}</h2>
        <p class="notif-msg">{{ item.data?.message || 'Ada pemberitahuan baru' }}</p>
      </ion-label>

      <p class="notif-time">{{ getTimeAgo(item.created_at) }}</p>

    </ion-item>
  </ion-list>

</ion-content>
