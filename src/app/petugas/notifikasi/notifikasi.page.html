<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/petugas/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Notifikasi <ion-badge color="danger" *ngIf="unreadCount > 0">{{ unreadCount }}</ion-badge></ion-title>
    <ion-buttons slot="end" *ngIf="unreadCount > 0">
      <ion-button (click)="markAllAsRead()">
        <ion-icon slot="icon-only" name="checkmark-done-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="notif-content">

  <!-- Loading State -->
  <div class="loading-state" *ngIf="isLoading">
    <div class="loading-card">
      <ion-spinner name="crescent" color="primary"></ion-spinner>
      <p>Memuat notifikasi...</p>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!isLoading && notifikasiList.length === 0">
    <div class="empty-illustration">
      <div class="bell-circle">
        <ion-icon name="notifications-outline"></ion-icon>
      </div>
      <div class="pulse-ring"></div>
    </div>
    <h3>Belum Ada Notifikasi</h3>
    <p>Semua notifikasi baru akan tampil di sini.<br>Tetap pantau untuk update terbaru!</p>
  </div>

  <!-- Notifikasi List -->
  <div class="notif-list-container" *ngIf="!isLoading && notifikasiList.length > 0">
    <ion-list lines="none">
      <ion-item class="notif-item" *ngFor="let item of notifikasiList" [ngClass]="{'unread': !item.read_at}"
        (click)="markAsRead(item)">

        <div class="notif-icon-wrap" slot="start" [ngClass]="getIconProps(item.type).bg">
          <ion-icon [name]="getIconProps(item.type).name"></ion-icon>
        </div>

        <ion-label>
          <h2>{{ item.data?.title || 'Notifikasi' }}</h2>
          <p class="notif-msg">{{ item.data?.message || 'Ada pemberitahuan baru' }}</p>
          <p class="notif-time-inline">
            <ion-icon name="time-outline"></ion-icon>
            {{ getTimeAgo(item.created_at) }}
          </p>
        </ion-label>

        <div class="unread-dot" *ngIf="!item.read_at" slot="end"></div>

      </ion-item>
    </ion-list>
  </div>

</ion-content>
