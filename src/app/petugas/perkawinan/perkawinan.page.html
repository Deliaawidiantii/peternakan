<ion-header class="ion-no-border">
  <ion-toolbar>
    <div class="gradient-header">
      <div style="display:flex;align-items:center;gap:12px;">
        <ion-back-button defaultHref="/petugas/tabs/home" style="--color:#fff;"></ion-back-button>
        <div>
          <h2 class="gradient-title">Perkawinan</h2>
        </div>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen="true" class="page-content">
  <div class="content-wrapper">

    <!-- Menu Cards -->
    <div class="perkawinan-menu">

      <div class="menu-card" routerLink="/petugas/perkawinan/input-perkawinan">
        <div class="menu-card-icon pink">
          <ion-icon name="heart-outline"></ion-icon>
        </div>
        <div class="menu-card-text">
          <h3>Catat Perkawinan Baru</h3>
          <p>Tambahkan data perkawinan baru untuk ternak Anda.</p>
        </div>
        <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
      </div>

      <div class="menu-card" routerLink="/petugas/perkawinan/riwayat-perkawinan">
        <div class="menu-card-icon blue">
          <ion-icon name="time-outline"></ion-icon>
        </div>
        <div class="menu-card-text">
          <h3>Riwayat Perkawinan</h3>
          <p>Lihat catatan perkawinan sebelumnya.</p>
        </div>
        <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
      </div>

      <div class="menu-card" routerLink="/petugas/perkawinan/pkb">
        <div class="menu-card-icon green">
          <ion-icon name="medkit-outline"></ion-icon>
        </div>
        <div class="menu-card-text">
          <h3>PKB (Pemeriksaan Kebuntingan)</h3>
          <p>Kelola data pemeriksaan kebuntingan ternak.</p>
        </div>
        <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
      </div>

      <div class="menu-card" routerLink="/petugas/perkawinan/lahir">
        <div class="menu-card-icon orange">
          <ion-icon name="happy-outline"></ion-icon>
        </div>
        <div class="menu-card-text">
          <h3>Lahir</h3>
          <p>Catat data kelahiran hasil perkawinan ternak.</p>
        </div>
        <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>
      </div>

    </div>

  </div>
</ion-content>
