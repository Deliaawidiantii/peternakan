<app-page-header
  title="Daftar Hewan Siap PKB"
  subtitle="Pilih hewan yang memenuhi syarat untuk proses PKB."
  defaultHref="/petugas/perkawinan"
></app-page-header>

<ion-content class="page-content">
  <div class="content-wrapper compact-bottom">
    <div class="modern-searchbar">
      <ion-searchbar
        placeholder="Cari ID, eartag, atau pemilik"
        [(ngModel)]="searchTerm"
        (ionInput)="filterHewan()"
      ></ion-searchbar>
    </div>

    <div class="filter-buttons">
      <ion-button fill="clear" size="small" [class.active]="selectedFilter === 'all'" (click)="setFilter('all')">Semua</ion-button>
      <ion-button fill="clear" size="small" [class.active]="selectedFilter === 'sapi'" (click)="setFilter('sapi')">Sapi</ion-button>
      <ion-button fill="clear" size="small" [class.active]="selectedFilter === 'kambing'" (click)="setFilter('kambing')">Kambing</ion-button>
      <ion-button fill="clear" size="small" [class.active]="selectedFilter === 'kerbau'" (click)="setFilter('kerbau')">Kerbau</ion-button>
    </div>

    <div class="list-header-row">
      <h3 class="section-label pkb-section-title">
        <ion-icon name="git-compare-outline"></ion-icon>
        Hewan Tersaring
      </h3>
      <span class="count-badge">{{ filteredHewan.length }}</span>
    </div>

    <app-empty-state
      *ngIf="filteredHewan.length === 0"
      icon="search-outline"
      title="Data tidak ditemukan"
      caption="Coba ubah kata kunci atau filter jenis hewan."
    ></app-empty-state>

    <div class="cards-list" *ngIf="filteredHewan.length > 0">
      <div class="data-card border-blue" *ngFor="let hewan of filteredHewan" (click)="lihatDetail(hewan)">
        <div class="pkb-row">
          <div class="icon-circle" [ngClass]="getJenisColor(hewan.jenis)">
            <ion-icon [name]="getJenisIcon(hewan.jenis)"></ion-icon>
          </div>

          <div class="pkb-copy">
            <div class="card-top-row">
              <div>
                <p class="card-title">{{ hewan.eartag }}</p>
                <p class="card-subtitle">ID {{ hewan.id }} | {{ hewan.pemilik }}</p>
              </div>
              <span class="status-badge" [ngClass]="getStatusClass(hewan.status)">
                {{ getStatusLabel(hewan.status) }}
              </span>
            </div>

            <div class="card-meta">
              <span class="meta-item">
                <ion-icon name="paw-outline"></ion-icon>
                {{ hewan.jenis }}
              </span>
              <span class="meta-item">
                <ion-icon name="leaf-outline"></ion-icon>
                {{ hewan.rumpun }}
              </span>
              <span class="meta-item">
                <ion-icon name="time-outline"></ion-icon>
                {{ hewan.usia }} bulan
              </span>
            </div>

            <div class="pkb-actions">
              <ion-button
                size="small"
                class="submit-btn"
                [disabled]="hewan.status !== 'siap'"
                (click)="lakukanPKB(hewan); $event.stopPropagation()"
              >
                Proses PKB
              </ion-button>

              <ion-button
                size="small"
                fill="outline"
                class="secondary-btn"
                (click)="lihatDetail(hewan); $event.stopPropagation()"
              >
                Detail
              </ion-button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</ion-content>
