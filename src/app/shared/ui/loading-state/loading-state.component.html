<div [class.page-card]="card">
  <div class="custom-loader" [class.compact]="compact">
    <div class="loader-orbit">
      <span class="loader-dot"></span>
      <span class="loader-dot dot-two"></span>
      <span class="loader-dot dot-three"></span>
    </div>
    <div class="loader-copy">
      <h3>{{ title }}</h3>
      <p>{{ caption }}</p>
    </div>
  </div>
</div>
