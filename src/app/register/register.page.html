<ion-content [fullscreen]="true" class="ion-padding register-page">
  <div class="container-register">
    <img src="assets/icon/logo2.png" alt="Logo" class="logo" />
  </div>

  <ion-card>
    <ion-card-header>
      <ion-card-title class="title">KARAWANG TERNAK</ion-card-title>
      <ion-card-subtitle class="subtitle">Registrasi Petugas</ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <!-- Error Message -->
      <div *ngIf="errors?.length" class="error-box">
        <ul>
          <li *ngFor="let error of errors">{{ error }}</li>
        </ul>
      </div>

      <!-- Form -->
      <form (ngSubmit)="onRegister()" #registerForm="ngForm">

        <ion-item>
          <ion-input type="text" name="nama" placeholder="Nama Lengkap" [(ngModel)]="form.nama" required></ion-input>
        </ion-item>

        <ion-item>
          <ion-input type="text" name="nik" placeholder="NIK" [(ngModel)]="form.nik" required></ion-input>
        </ion-item>

        <ion-item>
          <ion-input type="email" name="email" placeholder="Email" [(ngModel)]="form.email" required></ion-input>
        </ion-item>

        <!-- Desa Binaan dengan Searchable Dropdown -->
        <ion-item (click)="openDesaModal()" button="true" detail="false" [disabled]="isLoadingDesa">
          <ion-label position="stacked">Desa Binaan <span style="color: red;">*</span></ion-label>
          <ion-label *ngIf="!selectedDesaNama" color="medium" class="placeholder-label">Pilih Desa Binaan ▾</ion-label>
          <ion-label *ngIf="selectedDesaNama" class="selected-label">{{ selectedDesaNama }} ▾</ion-label>
          <ion-spinner *ngIf="isLoadingDesa" name="crescent" slot="end"></ion-spinner>
        </ion-item>

        <!-- Modal Searchable Desa -->
        <ion-modal [isOpen]="isDesaModalOpen" (didDismiss)="isDesaModalOpen = false" [breakpoints]="[0, 0.6, 0.9]"
          [initialBreakpoint]="0.6">
          <ng-template>
            <ion-header>
              <ion-toolbar color="primary">
                <ion-title>Pilih Desa Binaan</ion-title>
                <ion-buttons slot="end">
                  <ion-button (click)="isDesaModalOpen = false">Tutup</ion-button>
                </ion-buttons>
              </ion-toolbar>
              <ion-toolbar>
                <ion-searchbar placeholder="Cari desa..." (ionInput)="filterDesa($event)" debounce="200"
                  animated="true"></ion-searchbar>
              </ion-toolbar>
            </ion-header>
            <ion-content>
              <ion-list>
                <ion-item *ngFor="let desa of filteredDesaList" (click)="selectDesa(desa)" button="true"
                  [color]="form.desa_binaan === desa.id ? 'primary' : ''">
                  <ion-icon name="location-outline" slot="start"></ion-icon>
                  <ion-label>{{ desa.nama_desa || desa.nama || desa.desa }}</ion-label>
                  <ion-icon *ngIf="form.desa_binaan === desa.id" name="checkmark-circle" slot="end"
                    color="light"></ion-icon>
                </ion-item>
              </ion-list>
              <ion-item *ngIf="filteredDesaList.length === 0">
                <ion-label class="ion-text-center" color="medium">Desa tidak ditemukan</ion-label>
              </ion-item>
            </ion-content>
          </ng-template>
        </ion-modal>

        <ion-item>
          <ion-input type="text" name="no_telp" placeholder="No. Telepon" [(ngModel)]="form.no_telp"
            required></ion-input>
        </ion-item>

        <!-- Password -->
        <ion-item>
          <ion-input [type]="showPassword ? 'text' : 'password'" name="password" placeholder="Password"
            [(ngModel)]="form.password" required></ion-input>
          <ion-button fill="clear" slot="end" (click)="togglePassword()" type="button">
            <ion-icon [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </ion-item>

        <!-- Konfirmasi Password -->
        <ion-item>
          <ion-input [type]="showConfirmPassword ? 'text' : 'password'" name="password_confirmation"
            placeholder="Konfirmasi Password" [(ngModel)]="form.password_confirmation" required></ion-input>
          <ion-button fill="clear" slot="end" (click)="toggleConfirmPassword()" type="button">
            <ion-icon [name]="showConfirmPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </ion-button>
        </ion-item>

        <ion-button expand="block" type="submit" color="primary" class="register-btn">
          REGISTER
        </ion-button>
      </form>

      <p class="login-link">
        Sudah punya akun?
        <a routerLink="/login">Login</a>
      </p>
    </ion-card-content>
  </ion-card>
</ion-content>
